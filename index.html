<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="card">
            <header class="header">
                <h1>Lista de Tarefas</h1>
                <div class="stats">
                    <div class="stat">
                        <span class="stat-number" id="totalCount">0</span>
                        <span class="stat-label">Total</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number" id="completedCount">0</span>
                        <span class="stat-label">Concluídas</span>
                    </div>
                    <div class="stat">
                        <span class="stat-number" id="pendingCount">0</span>
                        <span class="stat-label">Pendentes</span>
                    </div>
                </div>
            </header>

            <div class="input-section">
                <div class="input-group">
                    <input type="text" id="tarefaInput" placeholder="Digite uma nova tarefa..." maxlength="100">
                    <button id="btnAdicionar" type="button">
                        <span>Adicionar</span>
                    </button>
                </div>
            </div>

            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">Todas</button>
                <button class="filter-btn" data-filter="pending">Pendentes</button>
                <button class="filter-btn" data-filter="completed">Concluídas</button>
            </div>

            <div id="warningMessage" class="warning-message hidden">
                ⚠️ Você tem muitas tarefas! (<span id="taskCount">0</span> itens)
            </div>

            <div class="task-container">
                <ul id="lista_tarefas" class="task-list"></ul>
            </div>

            <div class="actions">
                <button id="clearCompleted" class="clear-btn" style="display: none;">
                    Limpar Concluídas
                </button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
